controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    simple_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

simple_velocity_controller:
  ros__parameters:
    joints:
      - "base_left_wheel_joint"
      - "base_right_wheel_joint"
    
diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["base_left_wheel_joint"]
    right_wheel_names: ["base_right_wheel_joint"]
    wheel_separation: 0.42
    wheel_radius: 0.1
    cmd_vel_timeout: 0.5
    wheel_per_side: 1
    linear.x.max_velocity: 1.0
    linear.x.min_velocity: -1.0
    angular.z.max_velocity: 3.0
    angular.z.min_velocity: -3.0
    enable_odom_tf: true
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"
    publish_rate: 50.0
    use_stamped_vel: false
    # pose_covariance_diagonal: [0.001, 0.0, 0.0, 0.0, 0.0, 0.03]
    # twist_covariance_diagonal: [0.001, 0.0, 0.0, 0.0, 0.0, 0.03]