joy_teleop:
  ros__parameters:
    move:
      type: topic
      interface_type: geometry_msgs/msg/TwistStamped
      topic_name: /joy_in_teleop/cmd_vel_stamped

      deadman_buttons: [5]

      axis_mappings:
        twist-linear-x:
          axis: 1
          scale: 1.0
          offset: 0.0

        twist-angular-z:
          axis: 0
          scale: 1.0
          offset: 0.0

    gear1:
      type: topic
      interface_type: std_msgs/msg/Bool
      topic_name: /simple_velocity_controller/gear_1  

      deadman_buttons: [4]

      message_value:
        data:
          value: true

    gear2:
      type: topic
      interface_type: std_msgs/msg/Bool
      topic_name: /simple_velocity_controller/gear_2

      deadman_buttons: [6]

      message_value:
        data:
          value: true
          
